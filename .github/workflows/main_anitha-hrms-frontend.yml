name: Build and deploy Node.js app to Azure Web App - anitha-hrms-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Upload build folder
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: build   # ✅ only build folder

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_45D386A992FD43659B4923E71AF6EDDA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_32DFC27BB6D44F0081F0F8D9105A9E0C }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_D9D1FA9F0BD7430EA13E26F672F97DD1 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'anitha-hrms-frontend'
          slot-name: 'Production'
          package: .   # ✅ now this folder contains build files only
